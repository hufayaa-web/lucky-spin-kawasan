<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>KAWASANTOTO LUCKY SPIN NEW MEMBER</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  text-align:center;
  color:white;
  background:#020617;
}

h1{
  color:gold;
}

canvas{
  margin-top:20px;
  border-radius:50%;
  box-shadow:0 0 20px gold;
}

#pointer{
  width:0;height:0;
  border-left:15px solid transparent;
  border-right:15px solid transparent;
  border-bottom:30px solid white;
  margin:auto;
}

input,button{
  padding:10px;
  margin-top:10px;
}

button{
  background:gold;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

#result{
  margin-top:20px;
  font-size:22px;
  color:lime;
}
</style>
</head>

<body>

<h1>KAWASANTOTO LUCKY SPIN NEW MEMBER</h1>

<input id="userId" placeholder="Masukkan ID">
<br>

<div id="pointer"></div>
<canvas id="wheel" width="320" height="320"></canvas>

<br>
<button onclick="spin()">SPIN SEKARANG</button>

<h2 id="result"></h2>

<button onclick="window.location.href='https://inikawasan.mom/'">
CLAIM SEKARANG
</button>

<ul id="winnerList"></ul>

<script>
const rewards=["20rb","50rb","100rb","200rb","500rb","1jt","2jt"];
const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

/* DRAW WHEEL */
function draw(){
  const arc=(2*Math.PI)/rewards.length;

  for(let i=0;i<rewards.length;i++){
    ctx.beginPath();
    ctx.fillStyle=`hsl(${i*50},80%,50%)`;
    ctx.moveTo(160,160);
    ctx.arc(160,160,160,i*arc,(i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(160,160);
    ctx.rotate(i*arc+arc/2);
    ctx.fillStyle="white";
    ctx.font="bold 14px Arial";
    ctx.fillText(rewards[i],60,5);
    ctx.restore();
  }
}
draw();

/* SPIN */
function spin(){
  const input=document.getElementById("userId");
  const id=input.value.trim();

  if(id===""){
    alert("Masukkan ID dulu!");
    return;
  }

  if(localStorage.getItem("spin_"+id)){
    alert("ID sudah pernah spin!");
    return;
  }

  const index=Math.floor(Math.random()*rewards.length);
  const result=rewards[index];

  const deg=3600+(360-index*(360/rewards.length));

  canvas.style.transition="transform 5s ease-out";
  canvas.style.transform=`rotate(${deg}deg)`;

  setTimeout(()=>{
    document.getElementById("result").innerText=
      "🎉 Selamat anda mendapatkan "+result;

    localStorage.setItem("spin_"+id,result);

    addWinner(id,result);

    confetti({
      particleCount:200,
      spread:120
    });

  },5000);
}

/* WINNER LIST */
function addWinner(id,prize){
  const li=document.createElement("li");
  li.innerText=id+" - "+prize;
  document.getElementById("winnerList").appendChild(li);
}
</script>

</body>
</html>
