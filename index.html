<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>KAWASANTOTO LUCKY SPIN</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0"></script>

<style>
body{
  margin:0;
  text-align:center;
  color:white;
  background:black;
  font-family:Arial;
}

#wheelBox{
  position:relative;
  width:300px;
  height:300px;
  margin:auto;
}

canvas{
  border-radius:50%;
  box-shadow:0 0 30px gold;
}

button{
  padding:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>KAWASANTOTO LUCKY SPIN</h2>

<input id="userId" placeholder="Masukkan ID"><br>

<div id="wheelBox">
<canvas id="wheel" width="300" height="300"></canvas>
</div>

<button onclick="spin()">SPIN</button>

<h3 id="result"></h3>

<ul id="winnerList"></ul>

<script>
// 🔥 GANTI DENGAN PUNYA KAMU
const supabase = window.supabase.createClient(
  "SUPABASE_URL",
  "SUPABASE_ANON_KEY"
);

const rewards=["20rb","50rb","100rb","200rb","500rb","1jt","2jt"];
const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

const center=150;
const radius=140;

/* DRAW */
function draw(){
  const arc=(2*Math.PI)/rewards.length;
  for(let i=0;i<rewards.length;i++){
    ctx.beginPath();
    ctx.fillStyle=`hsl(${i*50},80%,50%)`;
    ctx.moveTo(center,center);
    ctx.arc(center,center,radius,i*arc,(i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(center,center);
    ctx.rotate(i*arc+arc/2);
    ctx.fillStyle="white";
    ctx.fillText(rewards[i],60,5);
    ctx.restore();
  }
}
draw();

/* LOAD WINNERS REAL */
async function loadWinners(){
  let { data } = await supabase
    .from('spins')
    .select('*')
    .order('created_at', { ascending: false })
    .limit(10);

  const list=document.getElementById("winnerList");
  list.innerHTML="";

  data.forEach(w=>{
    const li=document.createElement("li");
    li.innerText=w.id+" menang "+w.prize;
    list.appendChild(li);
  });
}

loadWinners();

/* SPIN REAL */
async function spin(){
  const id=document.getElementById("userId").value.trim();
  if(!id) return alert("Masukkan ID!");

  // cek sudah spin
  let { data:cek } = await supabase
    .from('spins')
    .select('*')
    .eq('id',id);

  if(cek.length>0){
    return alert("ID sudah pernah spin!");
  }

  const index=Math.floor(Math.random()*rewards.length);
  const result=rewards[index];

  const deg=3600+(360-index*(360/rewards.length));
  canvas.style.transition="transform 4s";
  canvas.style.transform=`rotate(${deg}deg)`;

  setTimeout(async ()=>{
    document.getElementById("result").innerText=
      "🎉 SELAMAT ANDA MENDAPATKAN "+result;

    // simpan ke database
    await supabase.from('spins').insert([
      { id:id, prize:result }
    ]);

    loadWinners();

    confetti();

  },4000);
}
</script>

</body>
</html>
