<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>KAWASANTOTO LUCKY SPIN</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  color: white;
  background: url('https://i.imgur.com/8Km9tLL.jpg') no-repeat center/cover;
}

/* FIRE */
.fire {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 150px;
  background: linear-gradient(to top, red, orange, transparent);
  animation: fire 0.3s infinite;
}
@keyframes fire {
  0% { transform: scaleY(1); }
  50% { transform: scaleY(1.3); }
  100% { transform: scaleY(1); }
}

/* WHEEL */
#wheel {
  width: 300px;
  height: 300px;
  border-radius: 50%;
  border: 8px solid gold;
  margin: 20px auto;
  position: relative;
  transition: transform 4s ease-out;
}

.segment {
  position: absolute;
  width: 50%;
  height: 50%;
  background: gold;
  transform-origin: 100% 100%;
}

button {
  padding: 10px 20px;
  font-weight: bold;
  background: gold;
  border: none;
  cursor: pointer;
}

#winners {
  max-height: 150px;
  overflow: auto;
  margin-top: 20px;
  background: rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<h1>KAWASANTOTO LUCKY SPIN NEW MEMBER</h1>

<input id="userid" placeholder="Masukkan ID"><br><br>
<button onclick="spin()">SPIN SEKARANG</button>

<div id="wheel"></div>

<h2 id="result"></h2>

<a href="https://inikawasan.mom/" target="_blank">
<button>Klaim Sekarang</button>
</a>

<div id="winners"></div>

<div class="fire"></div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const prizes = ["20rb","50rb","100rb","200rb","500rb","1jt","2jt"];

const wheel = document.getElementById("wheel");

// buat roda visual
for (let i = 0; i < prizes.length; i++) {
  let seg = document.createElement("div");
  seg.className = "segment";
  seg.style.transform = `rotate(${i * (360/prizes.length)}deg) skewY(-50deg)`;
  seg.innerText = prizes[i];
  wheel.appendChild(seg);
}

function spin() {
  let id = document.getElementById("userid").value;
  if (!id) return alert("Masukkan ID!");

  if (localStorage.getItem("used_" + id)) {
    return alert("ID sudah pernah spin!");
  }

  let index = Math.floor(Math.random() * prizes.length);
  let degree = 360 * 5 + (index * (360/prizes.length));

  wheel.style.transform = `rotate(${degree}deg)`;

  setTimeout(() => {
    let result = prizes[index];

    document.getElementById("result").innerHTML =
      "Selamat! Anda mendapatkan " + result;

    localStorage.setItem("used_" + id, true);

    // simpan winner
    let winners = JSON.parse(localStorage.getItem("winners") || "[]");
    winners.push(id + " - " + result);
    localStorage.setItem("winners", JSON.stringify(winners));

    showWinners();

    confetti({
      particleCount: 200,
      spread: 120
    });

    moneyRain();

  }, 4000);
}

function showWinners() {
  let data = JSON.parse(localStorage.getItem("winners") || "[]");
  document.getElementById("winners").innerHTML =
    data.map(w => "<div>"+w+"</div>").join("");
}

function moneyRain() {
  let end = Date.now() + 3000;
  (function frame() {
    confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
    confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
    if (Date.now() < end) requestAnimationFrame(frame);
  })();
}

showWinners();
</script>

</body>
</html>
