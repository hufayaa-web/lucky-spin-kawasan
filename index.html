<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>KAWASANTOTO LUCKY SPIN NEW MEMBER</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  text-align:center;
  color:white;
  overflow:hidden;
  background: radial-gradient(circle,#000,#020617);
}

/* 🌌 BACKGROUND CASINO ANIMASI */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:linear-gradient(45deg,red,blue,purple,cyan);
  animation:bg 10s linear infinite;
  opacity:0.15;
}

@keyframes bg{
  0%{transform:translate(0,0);}
  50%{transform:translate(-50%,-50%);}
  100%{transform:translate(0,0);}
}

/* TITLE */
h1{
  color:gold;
  text-shadow:0 0 20px gold,0 0 40px orange;
}

/* WHEEL */
canvas{
  margin-top:20px;
  border-radius:50%;
  box-shadow:
    0 0 20px gold,
    0 0 60px orange,
    inset 0 0 30px rgba(255,255,255,0.2);
}

/* POINTER */
#pointer{
  width:0;height:0;
  border-left:15px solid transparent;
  border-right:15px solid transparent;
  border-bottom:30px solid white;
  margin:auto;
  filter:drop-shadow(0 0 10px white);
}

/* BUTTON */
button,input{
  padding:10px;
  margin-top:10px;
}

button{
  background:gold;
  border:none;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 15px gold;
}

/* RESULT */
#result{
  font-size:26px;
  margin-top:20px;
  color:#00ffcc;
  text-shadow:0 0 15px #00ffcc;
}

/* 💸 MONEY */
.money{
  position:fixed;
  top:-50px;
  font-size:22px;
  animation:fall linear infinite;
}

@keyframes fall{
  to{transform:translateY(110vh);}
}
</style>
</head>

<body>

<h1>KAWASANTOTO LUCKY SPIN NEW MEMBER</h1>

<input id="userId" placeholder="Masukkan ID"><br>

<div id="pointer"></div>
<canvas id="wheel" width="340" height="340"></canvas>

<br>
<button onclick="spin()">SPIN SEKARANG</button>

<h2 id="result"></h2>

<button onclick="window.location.href='https://inikawasan.mom/'">
CLAIM SEKARANG
</button>

<ul id="winnerList"></ul>

<script>
const rewards=["20rb","50rb","100rb","200rb","500rb","1jt","2jt"];
const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

function draw(){
  const arc=(2*Math.PI)/rewards.length;

  for(let i=0;i<rewards.length;i++){
    ctx.beginPath();
    ctx.fillStyle=`hsl(${i*60},90%,50%)`;
    ctx.moveTo(170,170);
    ctx.arc(170,170,170,i*arc,(i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(170,170);
    ctx.rotate(i*arc+arc/2);
    ctx.fillStyle="white";
    ctx.font="bold 16px Arial";
    ctx.fillText(rewards[i],70,5);
    ctx.restore();
  }
}
draw();

function spin(){
  const id=document.getElementById("userId").value;

  if(!id) return alert("Masukkan ID!");
  if(localStorage.getItem(id)) return alert("ID sudah spin!");

  const index=Math.floor(Math.random()*rewards.length);
  const result=rewards[index];

  const arc=360/rewards.length;
  const target=3600+(360-index*arc);

  canvas.style.transition="transform 5s cubic-bezier(0.2,0.8,0.2,1)";
  canvas.style.transform=`rotate(${target}deg)`;

  setTimeout(()=>{
    document.getElementById("result").innerText=
      "🎉 SELAMAT ANDA MENDAPATKAN "+result;

    localStorage.setItem(id,result);

    addWinner(id,result);

    confetti({particleCount:400,spread:180});

    moneyRain();

  },5000);
}

function addWinner(id,prize){
  const li=document.createElement("li");
  li.innerText=id+" - "+prize;
  document.getElementById("winnerList").appendChild(li);
}

function moneyRain(){
  for(let i=0;i<40;i++){
    const m=document.createElement("div");
    m.className="money";
    m.innerText="💸";
    m.style.left=Math.random()*100+"%";
    m.style.animationDuration=(2+Math.random()*3)+"s";
    document.body.appendChild(m);
    setTimeout(()=>m.remove(),5000);
  }
}
</script>

</body>
</html>
