<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>KAWASANTOTO LUCKY SPIN NEW MEMBER</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0"></script>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: radial-gradient(circle, #020617, #000);
  color: white;
}

h1 {
  color: gold;
  margin-top: 20px;
}

#wheel {
  margin: 20px auto;
  width: 320px;
  height: 320px;
  border-radius: 50%;
  border: 10px solid gold;
  position: relative;
  transition: transform 5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
  box-shadow: 0 0 40px gold;
}

.slice {
  position: absolute;
  width: 50%;
  height: 50%;
  transform-origin: 100% 100%;
  text-align: right;
  padding-right: 10px;
  font-size: 14px;
  font-weight: bold;
}

#pointer {
  width: 0;
  height: 0;
  border-left: 15px solid transparent;
  border-right: 15px solid transparent;
  border-bottom: 30px solid white;
  margin: auto;
}

input {
  padding: 10px;
}

button {
  padding: 10px 20px;
  margin-top: 10px;
  background: gold;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

#result {
  margin-top: 20px;
  font-size: 22px;
  color: lime;
}
</style>
</head>

<body>

<h1>KAWASANTOTO LUCKY SPIN NEW MEMBER</h1>

<input id="userId" placeholder="Masukkan ID"><br>

<div id="pointer"></div>
<div id="wheel"></div>

<button onclick="spin()">SPIN SEKARANG</button>

<h2 id="result"></h2>

<button onclick="window.location.href='https://inikawasan.mom/'">
CLAIM SEKARANG
</button>

<script>
const rewards = ["20rb","50rb","100rb","200rb","500rb","1jt","2jt"];
const wheel = document.getElementById("wheel");

// buat slice roda + teks
rewards.forEach((text, i) => {
  const slice = document.createElement("div");
  slice.className = "slice";
  slice.style.transform = `rotate(${i * (360/rewards.length)}deg) skewY(-60deg)`;
  slice.style.background = `hsl(${i*50},70%,50%)`;
  slice.innerHTML = `<span style="transform:skewY(60deg); display:block;">${text}</span>`;
  wheel.appendChild(slice);
});

function spin() {
  const id = document.getElementById("userId").value;

  if (!id) return alert("Masukkan ID dulu!");

  if (localStorage.getItem(id)) {
    return alert("ID sudah pernah spin!");
  }

  const index = Math.floor(Math.random()*rewards.length);
  const result = rewards[index];

  const deg = 3600 + (index * (360/rewards.length));

  wheel.style.transform = `rotate(${deg}deg)`;

  setTimeout(() => {
    document.getElementById("result").innerText =
      "🎉 Selamat anda mendapatkan " + result;

    localStorage.setItem(id, result);

    confetti({
      particleCount: 200,
      spread: 100
    });

  }, 5000);
}
</script>

</body>
</html>
