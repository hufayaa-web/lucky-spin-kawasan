<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>KAWASANTOTO LUCKY SPIN NEW MEMBER</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#020617,#0f172a);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

/* CARD */
.container{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  padding:20px;
  border-radius:20px;
  box-shadow:0 0 40px rgba(0,0,0,0.5);
  text-align:center;
}

h1{
  color:gold;
}

/* INPUT */
input{
  padding:10px;
  margin-top:10px;
  width:200px;
  border-radius:10px;
  border:none;
}

/* BUTTON */
button{
  padding:10px 20px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:gold;
  font-weight:bold;
  cursor:pointer;
}

/* WHEEL */
canvas{
  margin-top:20px;
  border-radius:50%;
  box-shadow:0 0 20px gold;
}

/* POINTER */
#pointer{
  width:0;height:0;
  border-left:15px solid transparent;
  border-right:15px solid transparent;
  border-bottom:30px solid white;
  margin:auto;
}

#result{
  margin-top:20px;
  font-size:20px;
  color:#00ffcc;
}
</style>
</head>

<body>

<div class="container">

<h1>KAWASANTOTO LUCKY SPIN NEW MEMBER</h1>

<input id="userId" placeholder="Masukkan ID"><br>

<div id="pointer"></div>
<canvas id="wheel" width="300" height="300"></canvas>

<button onclick="spin()">SPIN</button>

<h2 id="result"></h2>

<button onclick="window.location.href='https://inikawasan.mom/'">
CLAIM
</button>

</div>

<script>
const rewards=["20rb","50rb","100rb","200rb","500rb","1jt","2jt"];
const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

function draw(){
  const arc=(2*Math.PI)/rewards.length;

  for(let i=0;i<rewards.length;i++){
    ctx.beginPath();
    ctx.fillStyle=`hsl(${i*50},80%,50%)`;
    ctx.moveTo(150,150);
    ctx.arc(150,150,150,i*arc,(i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(150,150);
    ctx.rotate(i*arc+arc/2);
    ctx.fillStyle="white";
    ctx.fillText(rewards[i],60,5);
    ctx.restore();
  }
}
draw();

function spin(){
  const id=document.getElementById("userId").value;

  if(!id) return alert("Masukkan ID!");
  if(localStorage.getItem(id)) return alert("Sudah spin!");

  const index=Math.floor(Math.random()*rewards.length);
  const result=rewards[index];

  const deg=3600+(360-index*(360/rewards.length));

  canvas.style.transition="transform 4s ease-out";
  canvas.style.transform=`rotate(${deg}deg)`;

  setTimeout(()=>{
    document.getElementById("result").innerText=
      "🎉 Selamat mendapatkan "+result;

    localStorage.setItem(id,result);

    confetti();

  },4000);
}
</script>

</body>
</html>
