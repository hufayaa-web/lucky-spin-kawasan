<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAWASANTOTO LUCKY SPIN NEW MEMBER</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0"></script>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:white;
  text-align:center;
  background:radial-gradient(circle at top,#1a0000,#000);
  overflow:hidden;
}

/* neon background */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:radial-gradient(circle,rgba(255,0,0,0.2),transparent 70%);
  animation:bgMove 10s linear infinite;
}

@keyframes bgMove{
  0%{transform:translate(0,0);}
  50%{transform:translate(-30%,-30%);}
  100%{transform:translate(0,0);}
}

/* glass container */
.container{
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
  width:360px;
  margin:20px auto;
  box-shadow:0 0 30px rgba(255,215,0,0.3);
}

/* title */
h2{
  color:gold;
  text-shadow:0 0 20px gold,0 0 40px orange;
}

/* wheel */
#wheelBox{
  position:relative;
  width:320px;
  height:320px;
  margin:auto;
}

canvas{
  border-radius:50%;
  box-shadow:0 0 40px gold;
}

/* pointer */
#pointer{
  width:0;height:0;
  border-left:15px solid transparent;
  border-right:15px solid transparent;
  border-bottom:30px solid white;
  margin:auto;
}

/* rotating lights */
.light{
  position:absolute;
  width:8px;
  height:8px;
  border-radius:50%;
  background:yellow;
  box-shadow:0 0 10px yellow;
}

/* input */
input{
  padding:10px;
  border-radius:10px;
  border:none;
  width:80%;
  margin-top:10px;
}

/* button */
button{
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,gold,orange);
  font-weight:bold;
  cursor:pointer;
}

/* result */
#result{
  margin-top:15px;
  font-size:20px;
  color:#00ffcc;
  animation:fadeIn 1s;
}

@keyframes fadeIn{
  from{opacity:0;transform:scale(0.8);}
  to{opacity:1;}
}

/* winner */
#winnerList{
  max-height:120px;
  overflow:hidden;
  margin-top:10px;
  text-align:left;
}

/* money */
.money{
  position:fixed;
  top:-50px;
  font-size:18px;
  animation:fall linear infinite;
}

@keyframes fall{
  to{transform:translateY(110vh);}
}
</style>
</head>

<body>

<div class="container">
<h2>KAWASANTOTO LUCKY SPIN</h2>

<input id="userId" placeholder="Masukkan ID">

<div id="pointer"></div>

<div id="wheelBox">
<canvas id="wheel" width="320" height="320"></canvas>
</div>

<button onclick="spin()">SPIN SEKARANG</button>

<div id="result"></div>

<button onclick="window.location.href='https://inikawasan.mom/'">
CLAIM
</button>

<h4>LIVE WINNER</h4>
<ul id="winnerList"></ul>
</div>

<audio id="spinSound" src="https://www.soundjay.com/misc/sounds/spin-1.mp3"></audio>
<audio id="winSound" src="https://www.soundjay.com/human/sounds/applause-8.mp3"></audio>

<script>
const rewards=["20rb","50rb","100rb","200rb","500rb","1jt","2jt"];
const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

const center=160;
const radius=150;

/* draw wheel */
function draw(){
  const arc=(2*Math.PI)/rewards.length;
  for(let i=0;i<rewards.length;i++){
    ctx.beginPath();
    ctx.fillStyle=`hsl(${i*50},80%,50%)`;
    ctx.moveTo(center,center);
    ctx.arc(center,center,radius,i*arc,(i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(center,center);
    ctx.rotate(i*arc+arc/2);
    ctx.fillStyle="white";
    ctx.fillText(rewards[i],70,5);
    ctx.restore();
  }
}
draw();

/* rotating lights */
const box=document.getElementById("wheelBox");
let offset=0;

setInterval(()=>{
  offset+=0.1;
  box.querySelectorAll(".light").forEach(l=>l.remove());

  for(let i=0;i<24;i++){
    const angle=(i/24)*2*Math.PI+offset;
    const x=center + radius*Math.cos(angle);
    const y=center + radius*Math.sin(angle);

    const l=document.createElement("div");
    l.className="light";
    l.style.left=(x-4)+"px";
    l.style.top=(y-4)+"px";

    box.appendChild(l);
  }
},50);

/* winner data */
let winners=JSON.parse(localStorage.getItem("winners"))||[];

function render(){
  const list=document.getElementById("winnerList");
  list.innerHTML="";
  winners.slice(-10).reverse().forEach(w=>{
    const li=document.createElement("li");
    li.innerText=w;
    list.appendChild(li);
  });
}
render();

/* live fake */
setInterval(()=>{
  const names=["andi","budi","rizky","agus"];
  const prizes=["20rb","50rb","100rb"];
  winners.push(names[Math.random()*4|0]+" menang "+prizes[Math.random()*3|0]);
  localStorage.setItem("winners",JSON.stringify(winners));
  render();
},3000);

/* spin */
function spin(){
  const id=document.getElementById("userId").value.trim();
  if(!id) return alert("Masukkan ID!");
  if(localStorage.getItem("spin_"+id)) return alert("Sudah pernah spin!");

  spinSound.play();

  const index=Math.floor(Math.random()*rewards.length);
  const result=rewards[index];

  const deg=3600+(360-index*(360/rewards.length));

  canvas.style.transition="transform 4s cubic-bezier(.2,.8,.2,1)";
  canvas.style.transform=`rotate(${deg}deg)`;

  setTimeout(()=>{
    resultBox.innerText="🎉 Selamat kamu dapat "+result;
    localStorage.setItem("spin_"+id,result);

    winners.push(id+" menang "+result);
    localStorage.setItem("winners",JSON.stringify(winners));
    render();

    winSound.play();
    confetti({particleCount:200,spread:120});
    money();

  },4000);
}

/* money */
function money(){
  for(let i=0;i<30;i++){
    const m=document.createElement("div");
    m.className="money";
    m.innerText="💸";
    m.style.left=Math.random()*100+"%";
    m.style.animationDuration=(2+Math.random()*2)+"s";
    document.body.appendChild(m);
    setTimeout(()=>m.remove(),4000);
  }
}
</script>

</body>
</html>
