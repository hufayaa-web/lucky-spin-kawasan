<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>KAWASANTOTO LUCKY SPIN NEW MEMBER</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  text-align:center;
  color:white;
  background:url("https://images.unsplash.com/photo-1606166325695-0e2cfe7d7d6f") no-repeat center/cover;
  overflow:hidden;
}

/* overlay */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.75);
  top:0;
  left:0;
  z-index:-1;
}

/* neon title */
h2{
  color:gold;
  text-shadow:0 0 20px gold,0 0 40px orange;
}

/* wheel box */
#wheelBox{
  position:relative;
  width:360px;
  height:360px;
  margin:auto;
}

/* wheel */
canvas{
  position:absolute;
  top:0;
  left:0;
  border-radius:50%;
  box-shadow:0 0 30px gold,0 0 60px orange;
}

/* pointer */
#pointer{
  width:0;height:0;
  border-left:15px solid transparent;
  border-right:15px solid transparent;
  border-bottom:30px solid white;
  margin:auto;
}

/* rotating lights */
.light{
  position:absolute;
  width:10px;
  height:10px;
  border-radius:50%;
  background:yellow;
  box-shadow:0 0 10px yellow;
}

/* input */
input{
  padding:10px;
  border-radius:10px;
  border:none;
  width:200px;
}

/* button */
button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,gold,orange);
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

/* result */
#result{
  margin-top:20px;
  font-size:22px;
  color:#00ffcc;
  text-shadow:0 0 10px #00ffcc;
}

/* money */
.money{
  position:fixed;
  top:-50px;
  font-size:22px;
  animation:fall linear infinite;
}

@keyframes fall{
  to{transform:translateY(110vh);}
}

/* winner list */
#winnerList{
  max-height:150px;
  overflow:hidden;
  margin-top:10px;
  text-align:left;
  padding:0 20px;
}
</style>
</head>

<body>

<h2>KAWASANTOTO LUCKY SPIN NEW MEMBER</h2>

<input id="userId" placeholder="Masukkan ID"><br>

<div id="pointer"></div>

<div id="wheelBox">
<canvas id="wheel" width="360" height="360"></canvas>
</div>

<button onclick="spin()">SPIN SEKARANG</button>

<h3 id="result"></h3>

<button onclick="window.location.href='https://inikawasan.mom/'">
CLAIM SEKARANG
</button>

<h3>LIVE WINNER</h3>
<ul id="winnerList"></ul>

<!-- SOUND -->
<audio id="spinSound" src="https://www.soundjay.com/misc/sounds/spin-1.mp3"></audio>
<audio id="winSound" src="https://www.soundjay.com/human/sounds/applause-8.mp3"></audio>

<script>
const rewards=["20rb","50rb","100rb","200rb","500rb","1jt","2jt"];
const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

const center=180;
const radius=170;

/* draw wheel */
function draw(){
  const arc=(2*Math.PI)/rewards.length;

  for(let i=0;i<rewards.length;i++){
    ctx.beginPath();
    ctx.fillStyle=`hsl(${i*50},80%,50%)`;
    ctx.moveTo(center,center);
    ctx.arc(center,center,radius,i*arc,(i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(center,center);
    ctx.rotate(i*arc+arc/2);
    ctx.fillStyle="white";
    ctx.font="bold 16px Arial";
    ctx.fillText(rewards[i],80,5);
    ctx.restore();
  }
}
draw();

/* rotating lights */
const box=document.getElementById("wheelBox");
const totalLamp=24;
let angleOffset=0;

setInterval(()=>{
  angleOffset+=0.05;
  box.querySelectorAll(".light").forEach(l=>l.remove());

  for(let i=0;i<totalLamp;i++){
    const angle=(i/totalLamp)*2*Math.PI+angleOffset;

    const x=center + radius*Math.cos(angle);
    const y=center + radius*Math.sin(angle);

    const lamp=document.createElement("div");
    lamp.className="light";
    lamp.style.left=(x-5)+"px";
    lamp.style.top=(y-5)+"px";

    box.appendChild(lamp);
  }
},50);

/* winner data */
let winnersData = JSON.parse(localStorage.getItem("winners")) || [];

function renderWinners(){
  const list=document.getElementById("winnerList");
  list.innerHTML="";

  winnersData.slice(-20).reverse().forEach(w=>{
    const li=document.createElement("li");
    li.innerText=w;
    list.appendChild(li);
  });
}

function addWinner(id,prize){
  const text=id+" menang "+prize+" barusan";
  winnersData.push(text);
  localStorage.setItem("winners",JSON.stringify(winnersData));
  renderWinners();
}

/* live fake */
setInterval(()=>{
  const names=["andi123","budi77","rizky88","agus55"];
  const prizes=["20rb","50rb","100rb","200rb"];

  const n=names[Math.floor(Math.random()*names.length)];
  const p=prizes[Math.floor(Math.random()*prizes.length)];

  winnersData.push(n+" menang "+p+" barusan");
  localStorage.setItem("winners",JSON.stringify(winnersData));
  renderWinners();
},4000);

renderWinners();

/* spin */
function spin(){
  const id=document.getElementById("userId").value.trim();

  if(!id) return alert("Masukkan ID!");
  if(localStorage.getItem("spin_"+id)) return alert("ID sudah pernah spin!");

  document.getElementById("spinSound").play();

  const index=Math.floor(Math.random()*rewards.length);
  const result=rewards[index];

  const deg=3600+(360-index*(360/rewards.length));

  canvas.style.transition="transform 5s cubic-bezier(0.2,0.8,0.2,1)";
  canvas.style.transform=`rotate(${deg}deg)`;

  setTimeout(()=>{
    document.getElementById("result").innerText=
      "🎉 SELAMAT ANDA MENDAPATKAN "+result;

    localStorage.setItem("spin_"+id,result);

    addWinner(id,result);

    document.getElementById("winSound").play();

    confetti({particleCount:400,spread:180});

    moneyRain();

  },5000);
}

/* money */
function moneyRain(){
  for(let i=0;i<40;i++){
    const m=document.createElement("div");
    m.className="money";
    m.innerText="💸";
    m.style.left=Math.random()*100+"%";
    m.style.animationDuration=(2+Math.random()*3)+"s";
    document.body.appendChild(m);
    setTimeout(()=>m.remove(),5000);
  }
}
</script>

</body>
</html>
