<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAWASANTOTO LUCKY SPIN NEW MEMBER</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  text-align:center;
  color:white;
  background:url("https://images.unsplash.com/photo-1606166325695-0e2cfe7d7d6f") no-repeat center/cover;
}

/* overlay biar elegan */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  top:0;
  left:0;
  z-index:-1;
}

/* container */
.box{
  margin-top:20px;
}

/* wheel */
#wheelBox{
  position:relative;
  width:340px;
  height:340px;
  margin:auto;
}

canvas{
  position:absolute;
  top:0;
  left:0;
  border-radius:50%;
  box-shadow:0 0 30px gold;
}

/* pointer */
#pointer{
  width:0;height:0;
  border-left:15px solid transparent;
  border-right:15px solid transparent;
  border-bottom:30px solid white;
  margin:auto;
}

/* lampu */
.light{
  position:absolute;
  width:10px;
  height:10px;
  border-radius:50%;
  background:yellow;
  box-shadow:0 0 10px yellow;
}

/* input & button */
input,button{
  padding:10px;
  margin-top:10px;
}

button{
  background:gold;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

/* result */
#result{
  margin-top:20px;
  font-size:22px;
  color:#00ffcc;
}

/* winner list */
#winnerList{
  max-height:150px;
  overflow:hidden;
  text-align:left;
  padding:0 20px;
}

/* money */
.money{
  position:fixed;
  top:-50px;
  font-size:22px;
  animation:fall linear infinite;
}

@keyframes fall{
  to{transform:translateY(110vh);}
}
</style>
</head>

<body>

<h2>KAWASANTOTO LUCKY SPIN NEW MEMBER</h2>

<input id="userId" placeholder="Masukkan ID"><br>

<div id="pointer"></div>

<div id="wheelBox">
<canvas id="wheel" width="340" height="340"></canvas>
</div>

<button onclick="spin()">SPIN SEKARANG</button>

<h3 id="result"></h3>

<button onclick="window.location.href='https://inikawasan.mom/'">
CLAIM SEKARANG
</button>

<h3>Daftar Pemenang</h3>
<ul id="winnerList"></ul>

<script>
const rewards=["20rb","50rb","100rb","200rb","500rb","1jt","2jt"];
const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

const center=170;
const radius=160;

/* DRAW WHEEL */
function draw(){
  const arc=(2*Math.PI)/rewards.length;

  for(let i=0;i<rewards.length;i++){
    ctx.beginPath();
    ctx.fillStyle=`hsl(${i*50},80%,50%)`;
    ctx.moveTo(center,center);
    ctx.arc(center,center,radius,i*arc,(i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(center,center);
    ctx.rotate(i*arc+arc/2);
    ctx.fillStyle="white";
    ctx.fillText(rewards[i],70,5);
    ctx.restore();
  }
}
draw();

/* lampu muter */
const box=document.getElementById("wheelBox");
let offset=0;

setInterval(()=>{
  offset+=0.05;
  box.querySelectorAll(".light").forEach(l=>l.remove());

  for(let i=0;i<24;i++){
    const angle=(i/24)*2*Math.PI+offset;
    const x=center + radius*Math.cos(angle);
    const y=center + radius*Math.sin(angle);

    const lamp=document.createElement("div");
    lamp.className="light";
    lamp.style.left=(x-5)+"px";
    lamp.style.top=(y-5)+"px";

    box.appendChild(lamp);
  }
},50);

/* winner data */
let winners = JSON.parse(localStorage.getItem("winners")) || [];

function render(){
  const list=document.getElementById("winnerList");
  list.innerHTML="";
  winners.slice(-15).reverse().forEach(w=>{
    const li=document.createElement("li");
    li.innerText=w;
    list.appendChild(li);
  });
}
render();

/* auto fake winner */
setInterval(()=>{
  const names=["andi","budi","rizky","agus","dani"];
  const prizes=["20rb","50rb","100rb","200rb"];

  winners.push(names[Math.random()*5|0]+" menang "+prizes[Math.random()*4|0]);
  localStorage.setItem("winners",JSON.stringify(winners));
  render();
},4000);

/* spin */
function spin(){
  const id=document.getElementById("userId").value.trim();

  if(!id) return alert("Masukkan ID!");
  if(localStorage.getItem("spin_"+id)) return alert("ID sudah pernah spin!");

  const index=Math.floor(Math.random()*rewards.length);
  const result=rewards[index];

  const deg=3600+(360-index*(360/rewards.length));

  canvas.style.transition="transform 5s ease-out";
  canvas.style.transform=`rotate(${deg}deg)`;

  setTimeout(()=>{
    document.getElementById("result").innerText=
      "🎉 SELAMAT ANDA MENDAPATKAN "+result;

    localStorage.setItem("spin_"+id,result);

    winners.push(id+" menang "+result);
    localStorage.setItem("winners",JSON.stringify(winners));
    render();

    confetti({particleCount:300,spread:150});
    moneyRain();

  },5000);
}

/* uang jatuh */
function moneyRain(){
  for(let i=0;i<40;i++){
    const m=document.createElement("div");
    m.className="money";
    m.innerText="💸";
    m.style.left=Math.random()*100+"%";
    m.style.animationDuration=(2+Math.random()*3)+"s";
    document.body.appendChild(m);
    setTimeout(()=>m.remove(),5000);
  }
}
</script>

</body>
</html>
