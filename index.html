<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>KAWASANTOTO LUCKY SPIN NEW MEMBER</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  text-align:center;
  color:white;
  background:url("https://images.unsplash.com/photo-1606166325695-0e2cfe7d7d6f") no-repeat center/cover;
}

/* overlay gelap */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  top:0;
  left:0;
  z-index:-1;
}

.container{
  margin-top:20px;
}

/* WHEEL */
#wheelBox{
  position:relative;
  width:340px;
  height:340px;
  margin:auto;
}

canvas{
  position:absolute;
  top:0;
  left:0;
  border-radius:50%;
  box-shadow:0 0 30px gold;
}

/* POINTER */
#pointer{
  width:0;height:0;
  border-left:15px solid transparent;
  border-right:15px solid transparent;
  border-bottom:30px solid white;
  margin:auto;
}

/* LAMPU */
.light{
  position:absolute;
  width:10px;
  height:10px;
  border-radius:50%;
  background:yellow;
  box-shadow:0 0 10px yellow;
  animation:blink 1s infinite alternate;
}

@keyframes blink{
  from{opacity:0.3;}
  to{opacity:1;}
}

input,button{
  padding:10px;
  margin-top:10px;
}

button{
  background:gold;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

#result{
  margin-top:20px;
  font-size:22px;
  color:#00ffcc;
}

/* 💸 UANG */
.money{
  position:fixed;
  top:-50px;
  font-size:22px;
  animation:fall linear infinite;
}

@keyframes fall{
  to{transform:translateY(110vh);}
}
</style>
</head>

<body>

<h2>KAWASANTOTO LUCKY SPIN NEW MEMBER</h2>

<input id="userId" placeholder="Masukkan ID"><br>

<div id="pointer"></div>

<div id="wheelBox">
<canvas id="wheel" width="340" height="340"></canvas>
</div>

<button onclick="spin()">SPIN SEKARANG</button>

<h3 id="result"></h3>

<button onclick="window.location.href='https://inikawasan.mom/'">
CLAIM SEKARANG
</button>

<h3>Daftar Pemenang</h3>
<ul id="winnerList"></ul>

<script>
const rewards=["20rb","50rb","100rb","200rb","500rb","1jt","2jt"];
const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

const center=170;
const radius=160;

/* DRAW WHEEL */
function draw(){
  const arc=(2*Math.PI)/rewards.length;

  for(let i=0;i<rewards.length;i++){
    ctx.beginPath();
    ctx.fillStyle=`hsl(${i*50},80%,50%)`;
    ctx.moveTo(center,center);
    ctx.arc(center,center,radius,i*arc,(i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(center,center);
    ctx.rotate(i*arc+arc/2);
    ctx.fillStyle="white";
    ctx.font="bold 14px Arial";
    ctx.fillText(rewards[i],70,5);
    ctx.restore();
  }
}
draw();

/* 💡 LAMPU */
const box=document.getElementById("wheelBox");
const totalLamp=24;

for(let i=0;i<totalLamp;i++){
  const angle=(i/totalLamp)*2*Math.PI;
  const x=center + radius*Math.cos(angle);
  const y=center + radius*Math.sin(angle);

  const lamp=document.createElement("div");
  lamp.className="light";
  lamp.style.left=(x-5)+"px";
  lamp.style.top=(y-5)+"px";
  lamp.style.animationDelay=(i*0.1)+"s";

  box.appendChild(lamp);
}

/* SPIN */
function spin(){
  const id=document.getElementById("userId").value.trim();

  if(!id) return alert("Masukkan ID!");
  if(localStorage.getItem("spin_"+id)) return alert("ID sudah pernah spin!");

  const index=Math.floor(Math.random()*rewards.length);
  const result=rewards[index];

  const deg=3600+(360-index*(360/rewards.length));

  canvas.style.transition="transform 5s ease-out";
  canvas.style.transform=`rotate(${deg}deg)`;

  setTimeout(()=>{
    document.getElementById("result").innerText=
      "🎉 SELAMAT ANDA MENDAPATKAN "+result;

    localStorage.setItem("spin_"+id,result);

    addWinner(id,result);

    confetti({particleCount:300,spread:150});

    moneyRain();

  },5000);
}

/* WINNER */
function addWinner(id,prize){
  const li=document.createElement("li");
  li.innerText=id+" - "+prize;
  document.getElementById("winnerList").appendChild(li);
}

/* 💸 UANG JATUH */
function moneyRain(){
  for(let i=0;i<40;i++){
    const m=document.createElement("div");
    m.className="money";
    m.innerText="💸";
    m.style.left=Math.random()*100+"%";
    m.style.animationDuration=(2+Math.random()*3)+"s";
    document.body.appendChild(m);
    setTimeout(()=>m.remove(),5000);
  }
}
</script>

</body>
</html>
