<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>KAWASANTOTO LUCKY SPIN NEW MEMBER</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0"></script>

<style>
body{
  margin:0;
  text-align:center;
  font-family:Arial;
  color:white;
  overflow:hidden;
  background:url("https://images.unsplash.com/photo-1596838132731-3301c3fd4317") no-repeat center/cover;
}

/* overlay gelap */
body::after{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  top:0;
  left:0;
  z-index:-1;
}

h1{
  color:gold;
  text-shadow:0 0 20px gold;
}

/* WHEEL */
canvas{
  margin-top:20px;
  border-radius:50%;
  box-shadow:0 0 40px gold,0 0 80px orange;
}

/* POINTER */
#pointer{
  width:0;
  height:0;
  border-left:15px solid transparent;
  border-right:15px solid transparent;
  border-bottom:30px solid white;
  margin:auto;
}

/* INPUT */
input,button{
  padding:10px;
  margin-top:10px;
}

button{
  background:gold;
  border:none;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 10px gold;
}

/* RESULT */
#result{
  font-size:24px;
  margin-top:20px;
  color:lime;
  text-shadow:0 0 10px lime;
}

/* WINNER LIST */
#winners{
  margin-top:20px;
}

/* 💸 UANG JATUH */
.money{
  position:fixed;
  top:-50px;
  font-size:20px;
  animation:fall linear infinite;
}

@keyframes fall{
  to{
    transform:translateY(100vh);
  }
}
</style>
</head>

<body>

<h1>KAWASANTOTO LUCKY SPIN NEW MEMBER</h1>

<input id="userId" placeholder="Masukkan ID"><br>

<div id="pointer"></div>
<canvas id="wheel" width="320" height="320"></canvas>

<br>
<button onclick="spin()">SPIN SEKARANG</button>

<h2 id="result"></h2>

<button onclick="window.location.href='https://inikawasan.mom/'">
CLAIM SEKARANG
</button>

<div id="winners">
<h3>Daftar Pemenang</h3>
<ul id="winnerList"></ul>
</div>

<script>
const rewards=["20rb","50rb","100rb","200rb","500rb","1jt","2jt"];
const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

/* DRAW WHEEL */
function draw(){
  const arc=(2*Math.PI)/rewards.length;

  for(let i=0;i<rewards.length;i++){
    ctx.beginPath();
    ctx.fillStyle=`hsl(${i*50},80%,50%)`;
    ctx.moveTo(160,160);
    ctx.arc(160,160,160,i*arc,(i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(160,160);
    ctx.rotate(i*arc+arc/2);
    ctx.fillStyle="white";
    ctx.font="bold 14px Arial";
    ctx.fillText(rewards[i],60,5);
    ctx.restore();
  }
}
draw();

/* SPIN */
function spin(){
  const id=document.getElementById("userId").value;

  if(!id) return alert("Masukkan ID dulu!");

  if(localStorage.getItem(id)){
    return alert("ID sudah pernah spin!");
  }

  const index=Math.floor(Math.random()*rewards.length);
  const result=rewards[index];

  const deg=3600+(360-index*(360/rewards.length));

  canvas.style.transition="transform 5s ease-out";
  canvas.style.transform=`rotate(${deg}deg)`;

  setTimeout(()=>{
    document.getElementById("result").innerText=
      "🎉 SELAMAT ANDA MENDAPATKAN "+result;

    localStorage.setItem(id,result);

    addWinner(id,result);

    confetti({particleCount:300,spread:150});

    startMoney();

  },5000);
}

/* WINNER LIST */
function addWinner(id,prize){
  const list=document.getElementById("winnerList");
  const li=document.createElement("li");
  li.innerText=id+" - "+prize;
  list.appendChild(li);
}

/* 💸 MONEY RAIN */
function startMoney(){
  for(let i=0;i<30;i++){
    const money=document.createElement("div");
    money.className="money";
    money.innerText="💸";
    money.style.left=Math.random()*100+"%";
    money.style.animationDuration=(2+Math.random()*3)+"s";
    document.body.appendChild(money);

    setTimeout(()=>money.remove(),5000);
  }
}
</script>

</body>
</html>
