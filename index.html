<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>KAWASANTOTO LUCKY SPIN</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0"></script>

<style>
body{
  margin:0;
  text-align:center;
  font-family:Arial;
  color:white;
  background: url("https://images.unsplash.com/photo-1606166325695-0e2cfe7d7d6f") no-repeat center center fixed;
  background-size: cover;
  position:relative;
}  

.container{
  margin-top:20px;
}

/* CENTER BOX */
#wheelBox{
  position:relative;
  width:340px;
  height:340px;
  margin:auto;
}

/* CANVAS */
canvas{
  position:absolute;
  top:0;
  left:0;
  border-radius:50%;
  box-shadow:0 0 30px gold;
}

/* POINTER */
#pointer{
  width:0;height:0;
  border-left:15px solid transparent;
  border-right:15px solid transparent;
  border-bottom:30px solid white;
  margin:auto;
}

/* LAMPU */
.light{
  position:absolute;
  width:10px;
  height:10px;
  border-radius:50%;
  background:yellow;
  box-shadow:0 0 10px yellow;
  animation:blink 1s infinite alternate;
}

@keyframes blink{
  from{opacity:0.3;}
  to{opacity:1;}
}

button,input{
  padding:10px;
  margin-top:10px;
}

button{
  background:gold;
  border:none;
  cursor:pointer;
}

#result{
  margin-top:20px;
  color:lime;
}
</style>
</head>

<body>

<h2>KAWASANTOTO LUCKY SPIN NEW MEMBER</h2>

<input id="userId" placeholder="Masukkan ID"><br>

<div id="pointer"></div>

<div id="wheelBox">
<canvas id="wheel" width="340" height="340"></canvas>
</div>

<button onclick="spin()">SPIN</button>

<h3 id="result"></h3>

<script>
const rewards=["20rb","50rb","100rb","200rb","500rb","1jt","2jt"];
const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");
const center=170;
const radius=160;

/* DRAW WHEEL */
function draw(){
  const arc=(2*Math.PI)/rewards.length;

  for(let i=0;i<rewards.length;i++){
    ctx.beginPath();
    ctx.fillStyle=`hsl(${i*50},80%,50%)`;
    ctx.moveTo(center,center);
    ctx.arc(center,center,radius,i*arc,(i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(center,center);
    ctx.rotate(i*arc+arc/2);
    ctx.fillStyle="white";
    ctx.fillText(rewards[i],70,5);
    ctx.restore();
  }
}
draw();

/* 💡 LAMPU PRESISI */
const box=document.getElementById("wheelBox");
const totalLamp=24;

for(let i=0;i<totalLamp;i++){
  const angle=(i/totalLamp)*2*Math.PI;

  const x=center + radius*Math.cos(angle);
  const y=center + radius*Math.sin(angle);

  const lamp=document.createElement("div");
  lamp.className="light";
  lamp.style.left=(x-5)+"px";
  lamp.style.top=(y-5)+"px";
  lamp.style.animationDelay=(i*0.1)+"s";

  box.appendChild(lamp);
}

/* SPIN */
function spin(){
  const id=document.getElementById("userId").value;

  if(!id) return alert("Masukkan ID!");
  if(localStorage.getItem(id)) return alert("Sudah spin!");

  const index=Math.floor(Math.random()*rewards.length);
  const result=rewards[index];

  const deg=3600+(360-index*(360/rewards.length));

  canvas.style.transition="transform 5s ease-out";
  canvas.style.transform=`rotate(${deg}deg)`;

  setTimeout(()=>{
    document.getElementById("result").innerText=
      "🎉 Selamat anda mendapatkan "+result;

    localStorage.setItem(id,result);

    confetti();

  },5000);
}
</script>

</body>
</html>
